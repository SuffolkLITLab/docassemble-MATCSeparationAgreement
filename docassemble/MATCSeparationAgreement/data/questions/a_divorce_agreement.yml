#################### Merger / Survival #####################

id: merger survival
question: |
  Merger and survival
subquestion: |
  Under [G.L. c. 208, §1A](https://malegislature.gov/Laws/GeneralLaws/PartII/TitleIII/Chapter208/Section1A),
  each provision of your agreement either **merges** into the divorce
  judgment or **survives** as a separate contract.

  - **Merged** — either party may ask the court to modify the provision
    if there is a substantial change in circumstances.
  - **Survived** — the provision remains a separate contract and cannot
    be modified by the court except for fraud, duress, or mistake.

  The following provisions **always survive** as a separate contract:

  - Personal property division
  % if not no_real_estate:
  - Real estate and asset division
  % endif
  % if not no_marital_debt:
  - Marital debt allocation
  % endif
  % if not no_retirement_benefits:
  - Retirement and pension benefits
  % endif

  % if has_children:
  The following child-related provisions **always merge** into the judgment:

  - Custody and parenting time
  - Child support
  - Children's health insurance
  - Education costs
  - Child tax claims

  % endif
  For the remaining provisions below, select which ones should **merge**.
  Any you do not select will **survive**.
fields:
  - Which provisions should merge into the judgment?: provisions_that_merge
    datatype: checkboxes
    choices:
      - Alimony
      - Health insurance (adult)
      - Life insurance
    none of the above: False
