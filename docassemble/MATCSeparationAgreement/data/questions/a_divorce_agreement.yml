metadata:
  title: Massachusetts 1A Divorce Separation Agreement
  short title: |
    Separation Agreement
  description: |
    This interview helps married people in Massachusetts prepare a separation
    agreement for an uncontested (1A) no-fault divorce.

    Both spouses must agree on all terms — including property, debts, children,
    and support — before using this interview.
  efilable: False
  can_I_use_this_form: |
    You can use this interview if:

    * You and your spouse both want a divorce
    * You both agree on all terms, including property, debts, children, and support
    * Your divorce is in the Probate and Family Court
  before_you_start: |
    Before you start, you will need:

    * The full legal names and current addresses of both spouses
    * Information about any children of the marriage (names and dates of birth)
    * Agreement on custody, parenting time, child support, and health insurance
    * Agreement on property, debts, alimony, and retirement benefits
  maturity: production
  estimated_completion_minutes: 45
  estimated_completion_delta: 15
  languages:
    - en
  help_page_url: https://www.mass.gov/how-to/file-for-a-1a-divorce
  help_page_title: How to file for a 1A divorce
