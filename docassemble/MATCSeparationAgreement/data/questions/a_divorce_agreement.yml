#################### Interview order #####################

id: interview order
mandatory: True
code: |
  nav.set_section("intro")
  al_intro_screen

  nav.set_section("parties")
  users[0].name.first
  users[0].phone_number
  party_a_handoff
  users[1].name.first
  users[1].phone_number

  # Set roles — Party A is users[0], Party B is users[1]
  users[0].party_label = "Party A"
  users[1].party_label = "Party B"
  users[0].separation_agreement_role = "party_a"
  users[1].separation_agreement_role = "party_b"
  party_a = users[0]
  party_b = users[1]

  nav.set_section("children_overview")
  has_children

  if has_children:
    children.target_number
    children.gather()

    nav.set_section("child_custody")
    custody_type_choice
    custody_custom_description

    nav.set_section("parenting_time")
    parenting_time_assigned
    if parenting_time_assigned:
      parenting_time_recipient
      parenting_time_description
      parenting_time_attached_schedule

    nav.set_section("child_support")
    child_support_payer
    child_support_recipient
    child_support_wage_assignment
    if child_support_wage_assignment:
      child_support_wage_assignment_full
      if not child_support_wage_assignment_full:
        child_support_shortfall_payer
    else:
      child_support_direct_payment
    child_support_guideline_amount
    child_support_deviation
    if child_support_deviation:
      child_support_deviation_reason
      child_support_amount_value
    child_support_frequency
    if len(children) > 1:
      child_support_applies_to
    child_support_ends_at_21

    nav.set_section("child_health_insurance")
    health_insurance_provided_for_children
    if not health_insurance_provided_for_children:
      health_insurance_custom_details_children
    else:
      health_insurance_provider_children
      health_insurance_types_children
      uninsured_expenses_split_children
      health_insurance_custom_description_children

    nav.set_section("education")
    education_cost_based_on_ability
    education_custom_description
    extracurricular_custom_terms
    if extracurricular_custom_terms:
      extracurricular_description

    nav.set_section("child_tax")
    child_tax_claim_single_party
    if child_tax_claim_single_party:
      child_tax_single_party
    else:
      child_tax_claim_split_years
      if child_tax_claim_split_years:
        child_tax_odd_year_party
        child_tax_even_year_party
    child_tax_claim_custom_description

    nav.set_section("life_insurance")
    users1_life_insurance_required
    users2_life_insurance_required
    neither_party_life_insurance

  nav.set_section("adult_health_insurance")
  health_insurance_custom_terms_adult
  if not health_insurance_custom_terms_adult:
    health_insurance_no_agreement_exit
  health_insurance_self_responsible
  if not health_insurance_self_responsible:
    health_insurance_provider_adult
    health_insurance_types_adult
    health_insurance_with_cost_allowed
    if health_insurance_with_cost_allowed == "Yes":
      health_insurance_cost_payer_adult
  uninsured_expenses_self_responsible
  health_insurance_custom_description_adult

  nav.set_section("taxes")
  taxes_custom_terms
  if not taxes_custom_terms:
    taxes_no_agreement_exit
  taxes_file_separately

  nav.set_section("alimony")
  alimony_waived_all
  if not alimony_waived_all:
    alimony_payment_agreed
    if alimony_payment_agreed:
      alimony_payer
      alimony_recipient
      alimony_amount_value
      alimony_frequency
      alimony_due_on
      alimony_end_date
      alimony_custom_description

  nav.set_section("real_estate")
  no_real_estate
  if not no_real_estate:
    real_estate_address
    real_estate_current_owner
    real_estate_county
    real_estate_book
    real_estate_page
    real_estate_custom_terms
    if real_estate_custom_terms:
      real_estate_transfer
      if real_estate_transfer:
        real_estate_owner_name
        real_estate_waiver_party
        real_estate_cost_responsible
        real_estate_start_date
    real_estate_custom_description

  nav.set_section("personal_property")
  personal_property_already_divided

  nav.set_section("debts")
  no_marital_debt
  if no_marital_debt:
    debt_custom_terms
    debt_custom_description
  individual_debt_responsible_each
  if not individual_debt_responsible_each:
    users[0].debt_listed
    users[1].debt_listed

  nav.set_section("retirement")
  no_retirement_benefits

  nav.set_section("life_insurance")
  no_life_insurance

  nav.set_section("merger")
  provisions_that_merge
  users1_initials
  users2_initials

  nav.set_section("court_info")
  trial_court
  signature_date
  docket_number

  a_divorce_agreement_preview_question
  basic_questions_signature_flow
  users[0].signature
  users[1].signature
  a_divorce_agreement_download
---
#################### Derived variables #####################

code: |
  merge_alimony = provisions_that_merge["Alimony"]
  merge_health_insurance = provisions_that_merge["Health insurance (adult)"]
  merge_life_insurance = provisions_that_merge["Life insurance"]
---
code: |
  agreement_merge_fully = False
  agreement_merge_none = False
  agreement_merge_partial = True
---
code: |
  custody_joint_legal_physical = (custody_type_choice == "Joint legal and physical custody")
  custody_joint_legal_split_physical = (custody_type_choice == "Joint legal custody, but one parent has primary physical custody")
  custody_sole = (custody_type_choice == "Sole legal and physical custody")
---
code: |
  signature_fields = ['users[0].signature', 'users[1].signature']
---
code: |
  has_no_children = not has_children
---
#################### Party info #####################

id: party A name
sets:
  - users[0].name.first
  - users[0].name.last
question: |
  First spouse — your name
fields:
  - First name: users[0].name.first
  - Middle name: users[0].name.middle
    required: False
  - Last name: users[0].name.last
  - Suffix: users[0].name.suffix
    required: False
    choices:
      - Jr.
      - Sr.
      - II
      - III
      - IV
---
id: party A phone
question: |
  ${ users[0].familiar() }'s phone number
fields:
  - Phone number: users[0].phone_number
---
id: party A handoff
continue button field: party_a_handoff
question: |
  Thank you, ${ users[0].familiar() }.
subquestion: |
  Next, we will collect the second spouse's contact information.
---
id: party B name
sets:
  - users[1].name.first
  - users[1].name.last
question: |
  Second spouse — your name
fields:
  - First name: users[1].name.first
  - Middle name: users[1].name.middle
    required: False
  - Last name: users[1].name.last
  - Suffix: users[1].name.suffix
    required: False
    choices:
      - Jr.
      - Sr.
      - II
      - III
      - IV
---
id: party B phone
question: |
  ${ users[1].familiar() }'s phone number
fields:
  - Phone number: users[1].phone_number
---
#################### Children #####################

id: has children
question: |
  Children
subquestion: |
  The court may make appropriate orders of maintenance, support and education
  of any child who has attained age 18 but who has not attained age 21 and who
  is domiciled in the home of a parent, and is principally dependent upon said
  parent for maintenance.

  [Learn more about child support in Massachusetts](https://www.mass.gov/info-details/child-support-guidelines)
fields:
  - Do you have any unemancipated children together?: has_children
    datatype: yesnoradio
---
id: how many children
question: |
  How many children do you have together?
subquestion: |
  Include any unemancipated children from this marriage, including those between
  18 and 21 who still live with and depend on a parent.
fields:
  - Number of children: children.target_number
    datatype: integer
    min: 1
---
id: child info
sets:
  - children[i].name.first
  - children[i].birthdate
question: |
  ${ ordinal(i).capitalize() } child's information
fields:
  - First name: children[i].name.first
  - Middle name: children[i].name.middle
    required: False
  - Last name: children[i].name.last
  - Date of birth: children[i].birthdate
    datatype: date
---
#################### Child Custody #####################

template: custody_term_joint_legal_physical
subject: |
  Joint legal and physical custody
content: |
  Both parents share responsibility for major decisions about the child —
  including education, medical care, and religious upbringing — and the
  child lives equally in both homes.
---
template: custody_term_joint_legal_split_physical
subject: |
  Joint legal custody, but one parent has primary physical custody
content: |
  Both parents share major decisions about the child, but the child lives
  primarily with one parent. The other parent has parenting time as agreed.
---
template: custody_term_sole
subject: |
  Sole legal and physical custody
content: |
  One parent has the right and responsibility to make all major decisions
  about the child, and the child lives primarily with that parent. The
  other parent may have parenting time.
---
id: child custody
question: |
  Custody arrangement
subquestion: |
  ${ collapse_template(custody_term_joint_legal_physical) }

  ${ collapse_template(custody_term_joint_legal_split_physical) }

  ${ collapse_template(custody_term_sole) }

  [Learn more about custody arrangements](https://www.mass.gov/info-details/learn-about-the-types-of-child-custody-arrangements)
fields:
  - What is your custody arrangement?: custody_type_choice
    datatype: radio
    choices:
      - Joint legal and physical custody
      - Joint legal custody, but one parent has primary physical custody
      - Sole legal and physical custody
  - Who will have custody?: sole_custody_holder
    input type: dropdown
    choices:
      - ${ users[0].name.full() }
      - ${ users[1].name.full() }
    show if:
      variable: custody_type_choice
      is: "Sole legal and physical custody"
  - Who will have physical custody?: physical_custody_holder
    input type: dropdown
    choices:
      - ${ users[0].name.full() }
      - ${ users[1].name.full() }
    show if:
      variable: custody_type_choice
      is: "Joint legal custody, but one parent has primary physical custody"
---
id: custody additional terms
question: |
  Additional custody terms
subquestion: |
  If you have any additional custody terms, describe them here. Leave blank if none.
fields:
  - Describe your additional custody terms in detail, including any specific conditions, schedules, or decision-making responsibilities: custody_custom_description
    datatype: area
    required: False
---
#################### Parenting Time #####################

id: parenting time
question: |
  Parenting time
subquestion: |
  Parenting time lets the parent without primary physical custody spend time
  with the child. The agreement says when, where, and for how long visits
  happen, and whether visits need to be supervised.

  [Learn more about parenting time](https://www.mass.gov/child-custody-and-parenting-time)
fields:
  - Is there a parenting time arrangement?: parenting_time_assigned
    datatype: yesnoradio
  - Who has parenting time?: parenting_time_recipient
    input type: radio
    choices:
      - ${ users[0].name.full() }
      - ${ users[1].name.full() }
    show if:
      variable: parenting_time_assigned
      is: True
  - What is the parenting time schedule?: parenting_time_description
    datatype: area
    show if:
      variable: parenting_time_assigned
      is: True
  - Is there a schedule for holidays or vacations to attach?: parenting_time_attached_schedule
    datatype: radio
    choices:
      - Yes
      - No
    show if:
      variable: parenting_time_assigned
      is: True
---
#################### Child Support #####################

id: child support who
question: |
  Child support — who pays and who receives
subquestion: |
  Child support is money one parent pays to help with a child's financial
  needs when the parents don't live together.

  [Learn more about child support](https://www.mass.gov/info-details/child-support-guidelines)
fields:
  - Who will pay child support?: child_support_payer
    input type: radio
    choices:
      - ${ users[0].name.full() }
      - ${ users[1].name.full() }
  - Who will receive child support?: child_support_recipient
    input type: radio
    choices:
      - ${ users[0].name.full() }
      - ${ users[1].name.full() }
---
id: child support payment method
question: |
  Child support — how it will be paid
subquestion: |
  Child support can be paid directly between parents or through a
  **wage assignment**, where the Department of Revenue automatically
  deducts payments from the paying parent's paycheck.
fields:
  - Will child support be paid through a wage assignment via the Department of Revenue?: child_support_wage_assignment
    datatype: yesnoradio
  - Is the full amount covered by the wage assignment?: child_support_wage_assignment_full
    datatype: yesnoradio
    show if:
      variable: child_support_wage_assignment
      is: True
  - Who will make up the difference?: child_support_shortfall_payer
    input type: radio
    choices:
      - ${ users[0].name.full() }
      - ${ users[1].name.full() }
      - Other
    show if:
      variable: child_support_wage_assignment_full
      is: False
  - Will child support be paid directly between the parties?: child_support_direct_payment
    datatype: yesnoradio
    show if:
      variable: child_support_wage_assignment
      is: False
---
id: child support amount
question: |
  Child support — amount
subquestion: |
  **Before answering, complete the Child Support Guidelines worksheet.**
  Use the [2025 Child Support Guidelines Worksheet (CJD 304)](https://www.mass.gov/info-details/probate-and-family-court-2025-child-support-guidelines-worksheet-cjd-304),
  effective December 1, 2025.
fields:
  - What is the weekly child support amount from the Guidelines worksheet?: child_support_guideline_amount
    datatype: currency
    min: 0
    default: 0
  - Are you agreeing to a different amount than the Guidelines recommend?: child_support_deviation
    datatype: yesnoradio
  - Why are you choosing a different amount?: child_support_deviation_reason
    datatype: area
    show if: child_support_deviation
  - What is the agreed child support amount?: child_support_amount_value
    datatype: currency
    min: 0
    default: 0
    show if: child_support_deviation
---
id: child support schedule
question: |
  Child support — payment schedule
fields:
  - How often will child support be paid?: child_support_frequency
    input type: radio
    choices:
      - Weekly
      - Monthly
      - Other
  - If other, please specify: child_support_frequency_other
    show if:
      variable: child_support_frequency
      is: "Other"
  - Does child support end when the youngest child turns 21?: child_support_applies_to
    datatype: radio
    choices:
      - youngest child
      - each child individually
    show if:
      code: |
        len(children) > 1
  - Do you agree that child support ends when the child turns 21?: child_support_ends_at_21
    datatype: yesnoradio
---
#################### Children's Health Insurance #####################

id: children health insurance
question: |
  Health insurance for the children
subquestion: |
  The court can order either parent to provide health insurance for your
  child as long as it is reasonably priced and accessible.

  [Learn more](https://www.mass.gov/info-details/2025-child-support-guidelines-section-ii-factors-to-be-considered-in-setting-the-child-support-order#f-child-support-for-children-between-the-ages-of-18-and-23)
fields:
  - Do you agree to provide health insurance for the children?: health_insurance_provided_for_children
    datatype: yesnoradio
  - Why are you agreeing to leave the children without health insurance coverage?: health_insurance_custom_details_children
    datatype: area
    show if:
      variable: health_insurance_provided_for_children
      is: False
---
id: children health insurance details
question: |
  Health insurance details for the children
fields:
  - Who will provide health insurance for the children?: health_insurance_provider_children
    datatype: radio
    choices:
      - ${ users[0].name.full() }
      - ${ users[1].name.full() }
  - What types of coverage will the children have?: health_insurance_types_children
    datatype: checkboxes
    choices:
      - MassHealth
      - Private Plan
      - Dental
      - Vision
  - Will you split the cost of uninsured medical or dental bills 50/50?: uninsured_expenses_split_children
    datatype: yesnoradio
---
id: children health insurance additional terms
question: |
  Additional terms for the children's health insurance
subquestion: |
  If you have any additional terms, describe them here. Leave blank if none.
fields:
  - Describe your additional health insurance terms in detail, including which plan will cover the children, how premiums will be split, and how out-of-pocket costs will be handled: health_insurance_custom_description_children
    datatype: area
    required: False
---
#################### Education #####################

id: education costs
question: |
  College or trade school costs
subquestion: |
  No parent will be ordered to pay more than 50% of the undergraduate,
  in-state resident costs of UMass Amherst, unless the court finds the
  parent has ability to pay more.

  [Learn more](https://www.mass.gov/info-details/2025-child-support-guidelines-section-ii-factors-to-be-considered-in-setting-the-child-support-order#g-contribution-to-post-secondary-expenses)
fields:
  - Do you agree to split college or trade school costs evenly?: education_cost_based_on_ability
    datatype: yesnoradio
---
id: education additional terms
question: |
  Education expense details
subquestion: |
  % if education_cost_based_on_ability:
  If you have any additional terms for education expenses, describe them here. Leave blank if none.
  % else:
  Since you are not splitting costs evenly, describe your education expense agreement below.
  % endif
fields:
  - Describe your education expense agreement in detail, including how costs will be divided, which schools or programs are covered, and any conditions that apply: education_custom_description
    datatype: area
    required: False
---
id: extracurricular activities
question: |
  Extracurricular activities
subquestion: |
  Do you have an agreement about sharing the cost of extracurricular activities and camps for your child(ren)?
fields:
  - Do you have an agreement on how to share extracurricular costs?: extracurricular_custom_terms
    datatype: yesnoradio
  - Describe your agreement for extracurricular activities and camps: extracurricular_description
    datatype: area
    required: False
    show if: extracurricular_custom_terms
---
#################### Child Tax #####################

id: child tax
question: |
  Claiming children on taxes
subquestion: |
  [Learn more about the Massachusetts Child and Family Tax Credit](https://www.mass.gov/info-details/massachusetts-child-and-family-tax-credit)
fields:
  - Will the same parent claim the children every year?: child_tax_claim_single_party
    input type: radio
    choices:
      - Yes: True
      - No: False
  - Who will claim the children each year?: child_tax_single_party
    input type: radio
    choices:
      - ${ users[0].name.full() }
      - ${ users[1].name.full() }
    show if:
      variable: child_tax_claim_single_party
      is: True
  - Will you alternate years claiming the children?: child_tax_claim_split_years
    input type: radio
    choices:
      - Yes: True
      - No: False
    show if:
      variable: child_tax_claim_single_party
      is: False
  - Who will claim the children in odd-numbered years?: child_tax_odd_year_party
    input type: radio
    choices:
      - ${ users[0].name.full() }
      - ${ users[1].name.full() }
    show if:
      variable: child_tax_claim_split_years
      is: True
  - Who will claim the children in even-numbered years?: child_tax_even_year_party
    input type: radio
    choices:
      - ${ users[0].name.full() }
      - ${ users[1].name.full() }
    show if:
      variable: child_tax_claim_split_years
      is: True
---
id: child tax additional terms
question: |
  Additional tax terms
subquestion: |
  If you have any additional terms for claiming the children on taxes, describe them here. Leave blank if none.
fields:
  - Describe your additional tax terms in detail, including which parent claims which children, any conditions, and how you will handle changes in circumstances: child_tax_claim_custom_description
    datatype: area
    required: False
---
#################### Children's Life Insurance #####################

id: children life insurance
question: |
  Life insurance for the children
subquestion: |
  If any of your children are minors, consider designating a trust or two
  trusted individuals as joint beneficiaries so the proceeds are managed
  for the children's welfare.

  [Learn more](https://www.mass.gov/info-details/life-insurance-basics)
fields:
  - ${ users[0].familiar() } will maintain life insurance and name the children as beneficiaries: users1_life_insurance_required
    datatype: yesno
  - ${ users[1].familiar() } will maintain life insurance and name the children as beneficiaries: users2_life_insurance_required
    datatype: yesno
  - Neither party has life insurance: neither_party_life_insurance
    datatype: yesno
---
#################### Adult Health Insurance #####################

id: adult health insurance
question: |
  Health insurance for the spouses
subquestion: |
  In Massachusetts, your health insurance can only be cancelled for
  non-payment of premium or fraud. You can enroll in a new health plan
  during the annual open enrollment period or through a qualifying event
  such as divorce.

  [Request an open enrollment waiver](https://www.mass.gov/info-details/request-an-open-enrollment-waiver)
fields:
  - Do you have an agreement on how to handle health insurance after the divorce?: health_insurance_custom_terms_adult
    datatype: yesnoradio
---
id: adult health insurance self responsible
question: |
  Health insurance — who is responsible?
fields:
  - Will each of you be responsible for your own health insurance?: health_insurance_self_responsible
    datatype: yesnoradio
---
id: adult health insurance provider
question: |
  Health insurance — coverage details
subquestion: |
  Since one spouse will provide coverage for the other, we need a few more details.
fields:
  - Who will provide health insurance?: health_insurance_provider_adult
    input type: radio
    choices:
      - ${ users[0].name.full() }
      - ${ users[1].name.full() }
  - Who will be covered under that plan?: health_insurance_recipient_adult
    input type: radio
    choices:
      - ${ users[0].name.full() }
      - ${ users[1].name.full() }
  - What types of coverage will be included?: health_insurance_types_adult
    datatype: checkboxes
    choices:
      - Medical
      - Dental
      - Vision
---
id: adult health insurance continuation
question: |
  Health insurance — if coverage ends
subquestion: |
  After a divorce, the covered spouse may lose access to the plan. This
  question addresses what happens if continued coverage requires an added
