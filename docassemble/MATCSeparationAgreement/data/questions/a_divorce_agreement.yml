  This interview helps you and your spouse prepare a **separation agreement**
  for an uncontested (1A) divorce in Massachusetts.

  **Before you start**, you and your spouse must already agree on all terms,
  including:

  * Property and debts
  * Children, custody, and support
  * Alimony and health insurance

  [Learn more about 1A divorce](https://www.mass.gov/how-to/file-for-a-1a-divorce)
